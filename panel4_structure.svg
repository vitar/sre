<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800" font-family="'Iowan Old Style', 'Palatino', Georgia, serif">
  <defs>
    <marker id="arrIn" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1a1a1a"/>
    </marker>
    <marker id="arrS" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2a5d7c"/>
    </marker>
    <marker id="arrR" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#b07a2a"/>
    </marker>
    <marker id="arrE" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#4a7c59"/>
    </marker>
    <marker id="arrBlock" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#8b0000"/>
    </marker>
    <marker id="arrInt" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>

    <!-- Pattern: crosshatch for "environment" shading -->
    <pattern id="envHatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#c9c0a8" stroke-width="0.5" opacity="0.5"/>
    </pattern>
  </defs>

  <rect width="1100" height="800" fill="#f4f1ea"/>

  <!-- Title -->
  <text x="50" y="48" font-size="13" letter-spacing="3" fill="#555">PANEL IV · reference</text>
  <text x="50" y="78" font-size="26" font-weight="500" fill="#1a1a1a">System Structure</text>
  <text x="50" y="102" font-size="14" font-style="italic" fill="#555">Five elements · environment-system interface · contour I/O path</text>

  <!-- ============================================ -->
  <!-- ENVIRONMENT (left) -->
  <!-- ============================================ -->
  <g transform="translate(0, 130)">
    <rect x="0" y="0" width="180" height="580" fill="url(#envHatch)" opacity="0.6"/>
    <text x="90" y="30" text-anchor="middle" font-size="14" font-weight="500" fill="#555" letter-spacing="2">ENVIRONMENT</text>
    <text x="90" y="48" text-anchor="middle" font-size="10" font-style="italic" fill="#666">external conditions</text>

    <!-- Inputs listed -->
    <g transform="translate(30, 100)" font-size="11" fill="#1a1a1a">
      <text x="0" y="0" font-weight="500">Inputs</text>
      <text x="0" y="22" font-style="italic">· resources</text>
      <text x="0" y="40" font-style="italic">· pressure</text>
      <text x="0" y="58" font-style="italic">· signals</text>
      <text x="0" y="76" font-style="italic">· actors</text>
    </g>

    <!-- Input arrows (entering the system) -->
    <line x1="60" y1="240" x2="175" y2="240" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrIn)"/>
    <line x1="60" y1="280" x2="175" y2="280" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrIn)"/>
    <line x1="60" y1="320" x2="175" y2="320" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrIn)"/>
    <text x="85" y="234" font-size="10" font-style="italic" fill="#333">resources</text>
    <text x="85" y="274" font-size="10" font-style="italic" fill="#333">pressure</text>
    <text x="85" y="314" font-size="10" font-style="italic" fill="#333">signals</text>
  </g>

  <!-- ============================================ -->
  <!-- SYSTEM (center) — the bounded region -->
  <!-- ============================================ -->
  <g transform="translate(180, 130)">
    
    <!-- Outer Boundary rectangle (double-line to emphasize structural role) -->
    <rect x="10" y="20" width="700" height="540" fill="#faf7ef" stroke="#1a1a1a" stroke-width="2.2"/>
    <rect x="14" y="24" width="692" height="532" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>

    <text x="24" y="44" font-size="10" letter-spacing="2" fill="#1a1a1a" font-weight="500">BOUNDARY</text>
    <text x="24" y="57" font-size="9" font-style="italic" fill="#666">inside vs. outside · actively maintained</text>

    <!-- GATE on the left edge (entry) -->
    <g transform="translate(-5, 200)">
      <rect x="0" y="0" width="30" height="180" fill="#ede7d7" stroke="#1a1a1a" stroke-width="1.4"/>
      <!-- gate "teeth" suggesting selectivity -->
      <line x1="0" y1="25" x2="30" y2="25" stroke="#1a1a1a" stroke-width="0.6"/>
      <line x1="0" y1="55" x2="30" y2="55" stroke="#1a1a1a" stroke-width="0.6"/>
      <line x1="0" y1="85" x2="30" y2="85" stroke="#1a1a1a" stroke-width="0.6"/>
      <line x1="0" y1="115" x2="30" y2="115" stroke="#1a1a1a" stroke-width="0.6"/>
      <line x1="0" y1="145" x2="30" y2="145" stroke="#1a1a1a" stroke-width="0.6"/>
      <text x="15" y="-10" text-anchor="middle" font-size="10" font-weight="500" fill="#1a1a1a" letter-spacing="2">GATE</text>
      <text x="15" y="200" text-anchor="middle" font-size="9" font-style="italic" fill="#666">selective</text>
    </g>

    <!-- RECEIVERS — three, oriented toward each contour -->
    <g transform="translate(90, 110)">
      <text x="0" y="-14" font-size="10" font-weight="500" fill="#1a1a1a" letter-spacing="2">RECEIVERS</text>
      <text x="0" y="-2" font-size="9" font-style="italic" fill="#666">threshold · legibility · orientation</text>

      <!-- Three receiver "dishes" -->
      <g transform="translate(0, 30)">
        <path d="M 0,10 Q 20,-8 40,10" fill="none" stroke="#2a5d7c" stroke-width="1.8"/>
        <line x1="20" y1="1" x2="20" y2="28" stroke="#2a5d7c" stroke-width="1"/>
        <circle cx="20" cy="30" r="3" fill="#2a5d7c"/>
        <text x="20" y="48" text-anchor="middle" font-size="9" fill="#2a5d7c" font-style="italic">R<tspan baseline-shift="sub" font-size="7">S</tspan></text>
      </g>
      <g transform="translate(60, 30)">
        <path d="M 0,10 Q 20,-8 40,10" fill="none" stroke="#b07a2a" stroke-width="1.8"/>
        <line x1="20" y1="1" x2="20" y2="28" stroke="#b07a2a" stroke-width="1"/>
        <circle cx="20" cy="30" r="3" fill="#b07a2a"/>
        <text x="20" y="48" text-anchor="middle" font-size="9" fill="#b07a2a" font-style="italic">R<tspan baseline-shift="sub" font-size="7">R</tspan></text>
      </g>
      <g transform="translate(120, 30)">
        <path d="M 0,10 Q 20,-8 40,10" fill="none" stroke="#4a7c59" stroke-width="1.8"/>
        <line x1="20" y1="1" x2="20" y2="28" stroke="#4a7c59" stroke-width="1"/>
        <circle cx="20" cy="30" r="3" fill="#4a7c59"/>
        <text x="20" y="48" text-anchor="middle" font-size="9" fill="#4a7c59" font-style="italic">R<tspan baseline-shift="sub" font-size="7">E</tspan></text>
      </g>
    </g>

    <!-- SIGNAL paths (from Gate to Receivers) -->
    <g stroke-width="1" fill="none">
      <path d="M 25,220 Q 70,180 110,160" stroke="#2a5d7c" stroke-dasharray="3 2" opacity="0.85"/>
      <path d="M 25,260 Q 90,220 170,160" stroke="#b07a2a" stroke-dasharray="3 2" opacity="0.85"/>
      <path d="M 25,300 Q 110,260 230,160" stroke="#4a7c59" stroke-dasharray="3 2" opacity="0.85"/>
    </g>
    <text x="50" y="150" font-size="9" fill="#555" font-style="italic">signals →</text>

    <!-- ALLOCATION ENGINE — the three-contour simplex in the middle -->
    <g transform="translate(360, 235)">
      <text x="0" y="-95" text-anchor="middle" font-size="11" font-weight="500" fill="#1a1a1a" letter-spacing="2">ALLOCATION</text>
      <text x="0" y="-80" text-anchor="middle" font-size="9" font-style="italic" fill="#666">S · R · E under scarcity</text>

      <!-- Small simplex -->
      <polygon points="-45,-40 45,-40 0,45" fill="#ede7d7" fill-opacity="0.5" stroke="#1a1a1a" stroke-width="1.2"/>
      <circle cx="-45" cy="-40" r="3" fill="#2a5d7c"/>
      <circle cx="45" cy="-40" r="3" fill="#b07a2a"/>
      <circle cx="0" cy="45" r="3" fill="#4a7c59"/>
      <text x="-50" y="-44" text-anchor="end" font-size="10" fill="#2a5d7c" font-weight="500">S</text>
      <text x="50" y="-44" text-anchor="start" font-size="10" fill="#b07a2a" font-weight="500">R</text>
      <text x="0" y="60" text-anchor="middle" font-size="10" fill="#4a7c59" font-weight="500">E</text>
      <!-- current allocation dot -->
      <circle cx="-5" cy="-5" r="3" fill="#1a1a1a"/>
    </g>

    <!-- Arrow: receivers feed allocation (routed below receivers, bending right) -->
    <path d="M 220,185 Q 260,205 300,215" stroke="#555" stroke-width="1" fill="none" stroke-dasharray="2 2" marker-end="url(#arrInt)"/>
    <text x="238" y="202" font-size="9" font-style="italic" fill="#555">parsed state</text>

    <!-- Arrows: allocation produces contour output (going right, toward right-edge boundary) -->
    <g fill="none" stroke-width="2">
      <!-- S output -->
      <path d="M 425,200 Q 520,180 640,180" stroke="#2a5d7c" marker-end="url(#arrS)"/>
      <!-- R output -->
      <path d="M 425,240 Q 520,280 640,290" stroke="#b07a2a" marker-end="url(#arrR)"/>
      <!-- E output -->
      <path d="M 425,275 Q 520,360 640,395" stroke="#4a7c59" marker-end="url(#arrE)"/>
    </g>

    <text x="445" y="172" font-size="9" font-style="italic" fill="#2a5d7c">Survival output</text>
    <text x="445" y="265" font-size="9" font-style="italic" fill="#b07a2a">Reproduction output</text>
    <text x="445" y="375" font-size="9" font-style="italic" fill="#4a7c59">Evolution output</text>

    <!-- CODE — substrate layer at the bottom -->
    <g transform="translate(40, 430)">
      <rect x="0" y="0" width="640" height="100" fill="#1a1a1a" fill-opacity="0.06" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="3 2"/>
      <text x="20" y="22" font-size="11" font-weight="500" fill="#1a1a1a" letter-spacing="2">CODE</text>
      <text x="20" y="38" font-size="9" font-style="italic" fill="#333">substrate · operating logic · not at same level as the other four</text>

      <!-- Four vertical lines connecting Code to each dependent element -->
      <g stroke="#1a1a1a" stroke-width="0.8" opacity="0.4" stroke-dasharray="1 2">
        <line x1="40" y1="0" x2="-70" y2="-230"/> <!-- to Gate -->
        <line x1="180" y1="0" x2="180" y2="-240"/> <!-- to Receivers -->
        <line x1="320" y1="0" x2="320" y2="-220"/> <!-- to Signals -->
        <line x1="560" y1="0" x2="560" y2="-410"/> <!-- to Boundary -->
      </g>

      <!-- Four configuration functions -->
      <g font-size="9" fill="#444" font-style="italic">
        <text x="85" y="62">configures Boundary</text>
        <text x="85" y="78" font-size="8" fill="#666">self vs. not-self</text>

        <text x="245" y="62">configures Gate</text>
        <text x="245" y="78" font-size="8" fill="#666">what is admitted</text>

        <text x="385" y="62">configures Signal legibility</text>
        <text x="385" y="78" font-size="8" fill="#666">shared format context</text>

        <text x="545" y="62">configures Receivers</text>
        <text x="545" y="78" font-size="8" fill="#666">threshold · legibility · orientation</text>
      </g>
    </g>

  </g>

  <!-- ============================================ -->
  <!-- ENVIRONMENT (right) — where outputs land -->
  <!-- ============================================ -->
  <g transform="translate(920, 130)">
    <rect x="0" y="0" width="180" height="580" fill="url(#envHatch)" opacity="0.6"/>
    <text x="90" y="30" text-anchor="middle" font-size="14" font-weight="500" fill="#555" letter-spacing="2">ENVIRONMENT</text>
    <text x="90" y="48" text-anchor="middle" font-size="10" font-style="italic" fill="#666">same environment · different effect</text>

    <!-- Output labels -->
    <g transform="translate(20, 135)">
      <circle cx="0" cy="0" r="4" fill="#2a5d7c"/>
      <text x="14" y="4" font-size="12" fill="#1a1a1a" font-weight="500">Survival output</text>
      <text x="14" y="19" font-size="9" font-style="italic" fill="#555">continuity · integrity</text>
    </g>

    <g transform="translate(20, 245)">
      <circle cx="0" cy="0" r="4" fill="#b07a2a"/>
      <text x="14" y="4" font-size="12" fill="#1a1a1a" font-weight="500">Reproduction output</text>
      <text x="14" y="19" font-size="9" font-style="italic" fill="#555">copies · scale · reach</text>
    </g>

    <g transform="translate(20, 365)">
      <circle cx="0" cy="0" r="4" fill="#4a7c59"/>
      <text x="14" y="4" font-size="12" fill="#1a1a1a" font-weight="500">Evolution output</text>
      <text x="14" y="19" font-size="9" font-style="italic" fill="#555">new capability · adaptation</text>
    </g>
  </g>

  <!-- ============================================ -->
  <!-- LEGIBILITY FAILURE MODES — bottom annotation -->
  <!-- ============================================ -->
  <g transform="translate(50, 730)">
    <text x="0" y="0" font-size="12" font-weight="500" fill="#1a1a1a">Three reasons a signal produces no response:</text>
    <g font-size="10" fill="#333">
      <text x="0" y="22"><tspan font-weight="500" fill="#8b0000">1. Gate blocked it</tspan> — access failure (intervention: reconfigure Gate)</text>
      <text x="0" y="40"><tspan font-weight="500" fill="#8b0000">2. Below Threshold</tspan> — strength failure (intervention: amplify Signal or lower Threshold)</text>
      <text x="540" y="22"><tspan font-weight="500" fill="#8b0000">3. Outside Legibility Range</tspan> — interpretation failure</text>
      <text x="540" y="40" font-style="italic" fill="#555">(intervention: Code rewrite — Receiver can't parse it at all)</text>
    </g>
  </g>
</svg>
