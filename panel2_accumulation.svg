<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" font-family="'Iowan Old Style', 'Palatino', Georgia, serif">
  <defs>
    <marker id="ax" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1a1a1a"/>
    </marker>
  </defs>

  <rect width="800" height="700" fill="#f4f1ea"/>

  <!-- Title -->
  <text x="50" y="50" font-size="13" letter-spacing="3" fill="#555">PANEL II</text>
  <text x="50" y="80" font-size="26" font-weight="500" fill="#1a1a1a">Accumulation Dynamics</text>
  <text x="50" y="105" font-size="14" font-style="italic" fill="#555">Curve shapes that connect allocation to trajectory</text>

  <!-- ===== Plot 1: Evolution Debt (exponential with perception lag) ===== -->
  <g transform="translate(80, 170)">
    <text x="0" y="-10" font-size="14" font-weight="500" fill="#1a1a1a">Evolution Debt</text>
    <text x="0" y="8" font-size="10" font-style="italic" fill="#666">exponential, masked by buffer exhaustion</text>

    <!-- Axes -->
    <line x1="0" y1="150" x2="200" y2="150" stroke="#1a1a1a" stroke-width="1" marker-end="url(#ax)"/>
    <line x1="0" y1="150" x2="0" y2="20" stroke="#1a1a1a" stroke-width="1" marker-end="url(#ax)"/>
    <text x="200" y="168" font-size="10" font-style="italic" fill="#333">t</text>
    <text x="-12" y="22" font-size="10" font-style="italic" fill="#333">D</text>

    <!-- Actual debt curve (exponential) -->
    <path d="M 0,148 
             Q 40,145 70,135 
             Q 100,120 130,90 
             Q 155,55 175,25" 
          fill="none" stroke="#c8410b" stroke-width="2"/>

    <!-- Observed (flat then sudden) — what the system sees -->
    <path d="M 0,148 L 120,146 Q 135,140 145,110 Q 158,60 175,30" 
          fill="none" stroke="#1a1a1a" stroke-width="1.4" stroke-dasharray="4 3"/>

    <!-- Buffer exhaustion marker -->
    <line x1="125" y1="150" x2="125" y2="140" stroke="#666" stroke-width="0.8"/>
    <text x="125" y="162" text-anchor="middle" font-size="9" font-style="italic" fill="#666">t*</text>
    
    <!-- Legend -->
    <g transform="translate(10, 185)" font-size="9" fill="#333">
      <line x1="0" y1="0" x2="14" y2="0" stroke="#c8410b" stroke-width="2"/>
      <text x="18" y="3">actual</text>
      <line x1="60" y1="0" x2="74" y2="0" stroke="#1a1a1a" stroke-width="1.4" stroke-dasharray="4 3"/>
      <text x="78" y="3">observed</text>
    </g>

    <text x="0" y="230" font-size="10" fill="#333" font-style="italic">
      accelerators: compounding · sensing decay
    </text>
  </g>

  <!-- ===== Plot 2: Survival Overhead (linear ratchet) ===== -->
  <g transform="translate(380, 170)">
    <text x="0" y="-10" font-size="14" font-weight="500" fill="#1a1a1a">Survival Overhead</text>
    <text x="0" y="8" font-size="10" font-style="italic" fill="#666">threshold-regime, hysteretic</text>

    <line x1="0" y1="150" x2="200" y2="150" stroke="#1a1a1a" stroke-width="1" marker-end="url(#ax)"/>
    <line x1="0" y1="150" x2="0" y2="20" stroke="#1a1a1a" stroke-width="1" marker-end="url(#ax)"/>
    <text x="200" y="168" font-size="10" font-style="italic" fill="#333">t</text>
    <text x="-18" y="22" font-size="10" font-style="italic" fill="#333">H</text>

    <!-- Step function: baseline, jump, new plateau, jump, plateau -->
    <path d="M 0,130 L 50,130 L 50,95 L 110,95 L 110,60 L 200,60" 
          fill="none" stroke="#2a5d7c" stroke-width="2"/>

    <!-- Dotted "natural decay if reversible" — showing it DOESN'T return -->
    <path d="M 110,60 L 140,62 L 175,65 L 200,65" 
          fill="none" stroke="#999" stroke-width="1" stroke-dasharray="2 3"/>

    <!-- Stress event markers -->
    <line x1="50" y1="150" x2="50" y2="130" stroke="#666" stroke-width="0.8" stroke-dasharray="2 2"/>
    <line x1="110" y1="150" x2="110" y2="95" stroke="#666" stroke-width="0.8" stroke-dasharray="2 2"/>
    <text x="50" y="162" text-anchor="middle" font-size="9" font-style="italic" fill="#666">σ₁</text>
    <text x="110" y="162" text-anchor="middle" font-size="9" font-style="italic" fill="#666">σ₂</text>

    <text x="0" y="230" font-size="10" fill="#333" font-style="italic">
      threshold → new baseline · no auto-return
    </text>
  </g>

  <!-- ===== Plot 3: Potential (step accumulation + decay + conversion) ===== -->
  <g transform="translate(80, 450)">
    <text x="0" y="-10" font-size="14" font-weight="500" fill="#1a1a1a">Potential</text>
    <text x="0" y="8" font-size="10" font-style="italic" fill="#666">step accumulation, half-life decay, discontinuous conversion</text>

    <line x1="0" y1="150" x2="200" y2="150" stroke="#1a1a1a" stroke-width="1" marker-end="url(#ax)"/>
    <line x1="0" y1="150" x2="0" y2="20" stroke="#1a1a1a" stroke-width="1" marker-end="url(#ax)"/>
    <text x="200" y="168" font-size="10" font-style="italic" fill="#333">t</text>
    <text x="-16" y="22" font-size="10" font-style="italic" fill="#333">Φ</text>

    <!-- Step 1: jump, slight decay, jump, slight decay, jump, then big conversion drop -->
    <path d="M 0,148 
             L 30,148 
             L 30,120 
             Q 55,123 65,128 
             L 65,95 
             Q 90,100 100,108 
             L 100,70 
             Q 125,76 135,84 
             L 140,84
             L 140,145" 
          fill="none" stroke="#4a7c59" stroke-width="2"/>

    <!-- Post-conversion: output flows into Reproduction -->
    <path d="M 140,145 L 200,145" fill="none" stroke="#4a7c59" stroke-width="2" opacity="0.4"/>

    <!-- Conversion event marker -->
    <line x1="140" y1="84" x2="160" y2="60" stroke="#4a7c59" stroke-width="0.8"/>
    <text x="162" y="58" font-size="9" font-style="italic" fill="#4a7c59">conversion</text>
    <text x="162" y="70" font-size="9" font-style="italic" fill="#4a7c59">(context match)</text>

    <!-- Learning event markers -->
    <text x="30" y="115" font-size="9" fill="#4a7c59">·</text>
    <text x="65" y="90" font-size="9" fill="#4a7c59">·</text>
    <text x="100" y="65" font-size="9" fill="#4a7c59">·</text>
  </g>

  <!-- ===== Right side: the debt-overhead loop ===== -->
  <g transform="translate(420, 440)">
    <text x="0" y="-10" font-size="14" font-weight="500" fill="#1a1a1a">The Reinforcing Loop</text>
    <text x="0" y="8" font-size="10" font-style="italic" fill="#666">engine of the degradation trajectory</text>

    <!-- Two nodes with circular arrows -->
    <g transform="translate(50, 90)">
      <ellipse cx="0" cy="0" rx="55" ry="22" fill="#f4f1ea" stroke="#c8410b" stroke-width="1.5"/>
      <text x="0" y="-3" text-anchor="middle" font-size="11" fill="#1a1a1a">Evolution</text>
      <text x="0" y="10" text-anchor="middle" font-size="11" fill="#1a1a1a">debt ↑</text>
    </g>

    <g transform="translate(260, 90)">
      <ellipse cx="0" cy="0" rx="55" ry="22" fill="#f4f1ea" stroke="#2a5d7c" stroke-width="1.5"/>
      <text x="0" y="-3" text-anchor="middle" font-size="11" fill="#1a1a1a">Survival</text>
      <text x="0" y="10" text-anchor="middle" font-size="11" fill="#1a1a1a">overhead ↑</text>
    </g>

    <!-- Curved arrows -->
    <path d="M 108,82 Q 155,50 202,82" fill="none" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#ax)"/>
    <path d="M 202,98 Q 155,130 108,98" fill="none" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#ax)"/>

    <text x="155" y="45" text-anchor="middle" font-size="9" font-style="italic" fill="#333">degraded capability → more maintenance</text>

    <text x="155" y="148" text-anchor="middle" font-size="9" font-style="italic" fill="#333">less allocation → more debt</text>

    <text x="155" y="180" text-anchor="middle" font-size="10" font-style="italic" fill="#c8410b">positive feedback</text>
  </g>

  <!-- Footer summary -->
  <g transform="translate(50, 690)">
    <text x="0" y="0" font-size="10" fill="#555" font-style="italic">
      Curve shapes claimed universal across domains · parameters domain-specific · universality classes?
    </text>
  </g>
</svg>
